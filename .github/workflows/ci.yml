name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint & swift test (macOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$LATEST" ] && sudo xcode-select -s "$LATEST"
          swift --version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Check formatting
        run: |
          brew install swiftformat >/dev/null
          swiftformat --lint .

      - name: Lint
        run: |
          brew install swiftlint >/dev/null
          swiftlint

      - name: Run tests
        run: swift test --no-parallel

  docs-links:
    name: check doc & site links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Catches dead links left behind by a rename/move in docs or the
      # landing page -- the cheapest signal we have that a doc has drifted
      # from what it links to. Retries handle transient network flakiness;
      # a genuinely broken link still fails the job.
      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-retries 2
            --exclude-path FenUITesting.xcodeproj
            --exclude-path .harness-runs
            --exclude "https://news\.ycombinator\.com/.*"
            --exclude "http://mouapp\.com/.*"
            --exclude "https://highlightjs\.org/.*"
            './**/*.md' './site/*.html'
          fail: true
