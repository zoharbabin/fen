name: FenUITesting
options:
  bundleIdPrefix: com.zoharbabin
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.0.0-dev"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Fen:
    path: .

targets:
  FenMacOSApp:
    type: application
    platform: macOS
    sources:
      - path: macOS
        excludes:
          - "AppIcon.iconset"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zoharbabin.fen
        PRODUCT_NAME: Fen
        INFOPLIST_FILE: macOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: macOS/Fen.entitlements
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Fen
        product: FenCore

  FeniOSApp:
    type: application
    platform: iOS
    sources:
      - path: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zoharbabin.fen-ios
        PRODUCT_NAME: Fen
        INFOPLIST_FILE: iOS/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Fen
        product: FenCore

  FenMacOSUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests/FenUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zoharbabin.fen.UITests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: FenMacOSApp
    dependencies:
      - target: FenMacOSApp

  FeniOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests/FeniOSUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zoharbabin.fen-ios.UITests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: FeniOSApp
    dependencies:
      - target: FeniOSApp

schemes:
  FenMacOSApp:
    build:
      targets:
        FenMacOSApp: all
        FenMacOSUITests: [test]
    test:
      targets:
        - FenMacOSUITests

  FeniOSApp:
    build:
      targets:
        FeniOSApp: all
        FeniOSUITests: [test]
    test:
      targets:
        - FeniOSUITests
